name: police
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Location & Maps
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter: ^2.9.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # Media & Files
  image_picker: ^1.1.2
  file_picker: ^10.3.10
  permission_handler: ^12.0.1

  # Network & Storage
  http: ^1.2.2
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.20.2
  device_info_plus: ^12.3.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/